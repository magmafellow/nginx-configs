server {
    listen 80;
    listen [::]:80;
    server_name domain www.domain;

    # If you used webroot for certbot, you may keep the .well-known location for renewals
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/domain;
    }

    access_log /var/log/nginx/domain.access.log;
    error_log /var/log/nginx/domain.error.log;

    # location / {
    #     return 301 https://$server_name$request_uri;
    # }

    root /var/www/domain;
    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name domain;

    # SSL certificates files (manual Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain/privkey.pem;

    # Strong SSL settings (recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/domain;
    index index.html;

    # Handle Let's Encrypt renewal webroot requests
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/domain;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
